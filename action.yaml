name: 'Setup Apify CLI'
description: 'Install and configure the Apify CLI for use in GitHub Actions'
branding:
  icon: 'terminal'
  color: 'green'
inputs:
  version:
    description: 'Version of Apify CLI to install (e.g. "1.1.1", "latest", "beta"). Defaults to latest stable version. Use "beta" to install the latest prerelease.'
    required: false
    default: 'latest'
  token:
    description: 'Your Apify token for authentication. The CLI will be automatically logged in with this token.'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Resolve version
      id: resolve-version
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [ "$INPUT_VERSION" = "beta" ]; then
          RESOLVED=$(gh api repos/apify/apify-cli/releases --jq '[.[] | select(.prerelease)] | .[0].tag_name' | sed 's/^v//')
          if [ -z "$RESOLVED" ]; then
            echo "::error::No prerelease version found for apify-cli"
            exit 1
          fi
          echo "version=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "Resolved beta to version $RESOLVED"
        else
          echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Apify CLI
      uses: jdx/mise-action@v4
      with:
        version: '2026.3.17'
        mise_toml: |
          [settings]
          idiomatic_version_file_enable_tools = []

          [tools."github:apify/apify-cli"]
          version = "${{ steps.resolve-version.outputs.version }}"
          bin = "apify"

          [tools."github:apify/apify-cli".platforms]
          linux-x64 = { asset_pattern = "apify-*-linux-x64" }
          linux-arm64 = { asset_pattern = "apify-*-linux-arm64" }
          macos-x64 = { asset_pattern = "apify-*-darwin-x64" }
          macos-arm64 = { asset_pattern = "apify-*-darwin-arm64" }
          windows-x64 = { asset_pattern = "apify-*-windows-x64.exe" }
          windows-arm64 = { asset_pattern = "apify-*-windows-arm64.exe" }

    - name: Login to Apify (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.token }}"
        apify login -t ${{ inputs.token }}
    - name: Login to Apify (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Output "::add-mask::${{ inputs.token }}"
        apify login -t "${{ inputs.token }}"

    - name: Verify Apify CLI installation (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        apify --version
        apify info
        echo "Apify CLI has been successfully installed and is ready to use!"
    - name: Verify Apify CLI installation (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        apify --version
        apify info
        Write-Output "Apify CLI has been successfully installed and is ready to use!"
